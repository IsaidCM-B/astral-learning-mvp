version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: astral-postgres
    environment:
      POSTGRES_DB: astral_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - astral-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: astral-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - astral-network

  # Backend (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astral-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/astral_learning
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      API_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - astral-network
    command: npm run start:dev

  # AI Orchestrator (FastAPI)
  ai-orchestrator:
    build:
      context: ./ai-orchestrator
      dockerfile: Dockerfile
    container_name: astral-ai-orchestrator
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/astral_learning
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./ai-orchestrator:/app
    networks:
      - astral-network
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend Parent (Next.js)
  frontend-parent:
    build:
      context: ./frontend-parent
      dockerfile: Dockerfile
    container_name: astral-frontend-parent
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NEXT_PUBLIC_AI_URL=http://localhost:8000
    ports:
      - "3001:3000"
    depends_on:
      - backend
      - ai-orchestrator
    volumes:
      - ./frontend-parent:/app
      - /app/node_modules
      - /app/.next
    networks:
      - astral-network
    command: npm run dev

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: astral-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend-parent
    networks:
      - astral-network

volumes:
  postgres_data:
  redis_data:

networks:
  astral-network:
    driver: bridge
